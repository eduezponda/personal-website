<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 62 32" fill="none">
  <defs>
    <clipPath id="ibm-bars">
      <!-- 3 stripes aligned to letter body (caps y≈9–29), equal 3px gaps -->
      <rect x="0" y="9"  width="62" height="5"/>
      <rect x="0" y="17" width="62" height="5"/>
      <rect x="0" y="25" width="62" height="5"/>
    </clipPath>
  </defs>
  <text
    x="1" y="29"
    font-family="Arial Black,Arial,sans-serif"
    font-size="28"
    font-weight="900"
    fill="#1F70C1"
    letter-spacing="2"
    clip-path="url(#ibm-bars)"
  >IBM</text>
</svg>
