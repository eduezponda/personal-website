<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 32" fill="none">
  <!-- IBM 8-bar simplified logo using blue stripes -->
  <!-- I bar -->
  <rect x="2"  y="6"  width="12" height="3" fill="#1F70C1"/>
  <rect x="2"  y="12" width="12" height="3" fill="#1F70C1"/>
  <rect x="2"  y="18" width="12" height="3" fill="#1F70C1"/>
  <rect x="2"  y="24" width="12" height="3" fill="#1F70C1"/>
  <!-- B bar -->
  <rect x="18" y="6"  width="12" height="3" fill="#1F70C1"/>
  <rect x="18" y="12" width="10" height="3" fill="#1F70C1"/>
  <rect x="18" y="18" width="12" height="3" fill="#1F70C1"/>
  <rect x="18" y="24" width="12" height="3" fill="#1F70C1"/>
  <!-- M bar -->
  <rect x="34" y="6"  width="12" height="3" fill="#1F70C1"/>
  <rect x="34" y="12" width="12" height="3" fill="#1F70C1"/>
  <rect x="34" y="18" width="12" height="3" fill="#1F70C1"/>
  <rect x="34" y="24" width="12" height="3" fill="#1F70C1"/>
</svg>
